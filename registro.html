    <title>Mis Tarjetas - Creación de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const svg = button.querySelector('svg');
            
            if (input.type === "password") {
                // Mostrar la contraseña cambiándolo a texto plano
                input.type = "text";
                // Cambiar el diseño del icono SVG a Ojito Abierto
                svg.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                `;
            } else {
                // Volver a ocultar la contraseña
                input.type = "password";
                // Cambiar el diseño del icono SVG a Ojito Tachado / Cerrado
                svg.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                `;
            }
        }




    </script>

<body class="bg-cover bg-center bg-no-repeat min-h-screen flex items-center justify-center p-4 font-sans" 
      style="background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80');">

    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg border border-gray-100">
        <div class="mb-6">

        <form action="altas.php" method="POST" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <input type="text" name="nombre" placeholder="Nombre" required 
                           class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <input type="text" name="apellido" placeholder="Apellido" required 
                           class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <select name="tipo_doc" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-600">
                        <option value="" disabled selected>Tipo de documento</option>
                        <option value="DNI">DNI</option>
                        <option value="Pasaporte">Pasaporte</option>
                    </select>
                </div>
                <div>
                    <input type="text" name="documento" placeholder="Número" required 
                           class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1 px-1">Fecha de nacimiento</label>
                <input type="date" name="fecha_nacimiento" required 
                       class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm text-gray-600">
            </div>

            <div>
                <input type="email" name="email" placeholder="Email" required 
                       class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
            </div>

            <div>
                <select name="banco_emisor" required class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-600">
                    <option value="" disabled selected>Seleccioná tu Banco Emisor</option>
                    <option value="galicia">Banco Galicia</option>
                    <option value="santander">Santander</option>
                    <option value="provincia">Banco Provincia</option>
                    <option value="nacion">Banco Nación</option>
                    <option value="macro">Banco Macro</option>
                    <option value="bbva">BBVA</option>
                </select>
            </div>
            <div>
                <input type="text" name="usuario" placeholder="Ingresa tu Usuario" required 
                       class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
            </div>
